<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activ Surgical — Hero (Main)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/hero.css" />
  </head>
  <body class="hero-page--main">
    <div class="hero__frame">
      <section class="hero hero--main" id="hero">
        <div class="hero__bg-media" id="hero-bg-media">
          <img
            class="hero__bg-image"
            src="assets/hero-focused.jpg"
            alt=""
            decoding="async"
            fetchpriority="high"
          />
          <video
            id="hero-video"
            class="hero__bg-video"
            muted
            loop
            playsinline
            preload="metadata"
            poster="assets/hero-focused.jpg"
          >
            <source src="assets/hero-surgery.mp4" type="video/mp4" />
          </video>
        </div>
        <canvas id="hero-canvas" aria-hidden="true"></canvas>

        <header class="hero__header">
          <nav class="hero__nav-pill" aria-label="Primary">
            <a href="#" class="hero__logo" aria-label="Activ Surgical home">
              <img
                class="hero__logo-img"
                src="assets/activ-logo-white.svg"
                width="102"
                height="30"
                alt=""
              />
            </a>
            <div class="hero__nav-links">
              <a href="#" class="hero__nav-link">
                Technology
                <svg class="hero__nav-chevron" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                  <path d="M4 6.5 8 10.5 12 6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
              </a>
              <a href="#" class="hero__nav-link">
                Solutions
                <svg class="hero__nav-chevron" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                  <path d="M4 6.5 8 10.5 12 6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
              </a>
              <a href="#" class="hero__nav-link">
                Company
                <svg class="hero__nav-chevron" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                  <path d="M4 6.5 8 10.5 12 6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
              </a>
              <a href="#" class="hero__nav-link">
                Resources
                <svg class="hero__nav-chevron" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                  <path d="M4 6.5 8 10.5 12 6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
              </a>
            </div>
          </nav>

          <a href="#" class="hero__cta hero__cta--header">Book a Demo</a>
        </header>

        <div class="hero__main">
          <div class="hero__content-center">
            <h1 class="hero__headline">Insight beyond the surface.</h1>
            <p class="hero__subheadline">
              Real-time surgical intelligence to empower surgeons and platforms in
              the moments that matter most.
            </p>
          </div>
        </div>

        <button type="button" class="hero__video-btn" id="hero-video-btn">
          <span class="hero__video-btn-icon" aria-hidden="true">▶</span>
          <span class="hero__video-btn-label">Watch</span>
          <span class="hero__video-btn-time">1:25</span>
        </button>
      </section>
    </div>

    <script type="module" src="/src/main-hero-image.js"></script>
  </body>
</html>
