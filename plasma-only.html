<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activ Surgical — Hero (Light)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/hero.css" />
  </head>
  <body class="hero-page--light">
    <section class="hero hero--split" id="hero">
      <canvas id="hero-canvas" aria-hidden="true"></canvas>

      <header class="hero__header">
        <a href="#" class="hero__logo" aria-label="Activ Surgical home">
          <img
            class="hero__logo-img"
            src="/assets/activ-logo.svg"
            width="136"
            height="40"
            alt=""
          />
        </a>

        <div class="hero__header-end">
          <nav class="hero__nav" aria-label="Primary">
            <a href="#" class="hero__nav-link">
              Technology
              <svg class="hero__nav-chevron" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M4 6.5 8 10.5 12 6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </a>
            <a href="#" class="hero__nav-link">
              Solutions
              <svg class="hero__nav-chevron" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M4 6.5 8 10.5 12 6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </a>
            <a href="#" class="hero__nav-link">
              Company
              <svg class="hero__nav-chevron" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M4 6.5 8 10.5 12 6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </a>
            <a href="#" class="hero__nav-link">
              Resources
              <svg class="hero__nav-chevron" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M4 6.5 8 10.5 12 6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </a>
          </nav>

          <a href="#" class="hero__cta hero__cta--header">Book a Demo</a>
        </div>
      </header>

      <div class="hero__header-rule" aria-hidden="true"></div>

      <div class="hero__main">
        <div class="hero__intro">
          <h1 class="hero__headline">
            <span class="hero__headline-line">Insight</span>
            <span class="hero__headline-line">beyond the</span>
            <span class="hero__headline-line">surface.</span>
          </h1>
          <a href="#" class="hero__cta hero__cta--primary">Book a Demo</a>
        </div>

        <p class="hero__subheadline hero__subheadline--aside">
          Real-time surgical intelligence to empower surgeons and platforms in
          the moments that matter most.
        </p>
      </div>

      <footer class="hero__footer">
        <div class="hero__stats">
          <div class="hero__stat">
            <p class="hero__stat-label">Surgical cases</p>
            <p class="hero__stat-value">1,000+</p>
          </div>
          <div class="hero__stat">
            <p class="hero__stat-label">Only dye-free perfusion technology</p>
            <p class="hero__stat-value">FDA-cleared</p>
          </div>
          <div class="hero__stat">
            <p class="hero__stat-label">YoY growth</p>
            <p class="hero__stat-value">122%</p>
          </div>
        </div>
      </footer>

      <button type="button" class="hero__scroll" aria-label="Scroll down">
        <img
          class="hero__scroll-img"
          src="/assets/scroll-arrow.svg"
          width="60"
          height="60"
          alt=""
        />
      </button>
    </section>

    <script type="module" src="/src/main-plasma-only.js"></script>
  </body>
</html>
