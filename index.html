<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activ Surgical — Hero Prototype</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/hero.css" />
  </head>
  <body>
    <section class="hero" id="hero">
      <canvas id="hero-canvas" aria-hidden="true"></canvas>

      <video
        id="hero-video"
        class="hero__video-source"
        muted
        loop
        playsinline
        preload="auto"
        poster="/assets/hero-focused.jpg"
      >
        <source src="/assets/hero-surgery.mp4" type="video/mp4" />
      </video>

      <header class="hero__header">
        <a href="#" class="hero__logo" aria-label="Activ Surgical home">
          <span class="hero__logo-mark" aria-hidden="true"></span>
          <span class="hero__logo-text">ACTIV SURGICAL</span>
        </a>

        <nav class="hero__nav" aria-label="Primary">
          <a href="#">Technology</a>
          <a href="#">Solutions</a>
          <a href="#">Company</a>
          <a href="#">Resources</a>
        </nav>

        <a href="#" class="hero__cta hero__cta--header">Book a Demo</a>
      </header>

      <div class="hero__content">
        <h1 class="hero__headline">Insight beyond the surface.</h1>
        <p class="hero__subheadline">
          Real-time surgical intelligence to empower surgeons and platforms in
          the moments that matter most.
        </p>
      </div>

      <button type="button" class="hero__video-btn" id="hero-video-btn">
        <span class="hero__video-btn-icon" aria-hidden="true">▶</span>
        Watch 1:25
      </button>
    </section>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
