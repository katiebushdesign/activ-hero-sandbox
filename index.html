<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activ Surgical — Hero Sandbox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/hero.css" />
  </head>
  <body class="hero-page--index">
    <main class="hero-index">
      <a href="./" class="hero-index__logo" aria-label="Activ Surgical home">
        <img
          class="hero-index__logo-img"
          src="assets/activ-logo.svg"
          width="136"
          height="40"
          alt=""
        />
      </a>

      <div class="hero-index__intro">
        <h1 class="hero-index__title">Hero sandbox</h1>
        <p class="hero-index__lead">Interactive plasma hero prototypes for the Activ Surgical website.</p>
      </div>

      <nav class="hero-index__nav" aria-label="Hero variants">
        <a class="hero-index__card" href="hero-image.html">
          <span class="hero-index__card-label">Main</span>
          <span class="hero-index__card-title">Image hero</span>
          <span class="hero-index__card-desc">Surgery photo, glass nav, video toggle, plasma overlay.</span>
        </a>

        <a class="hero-index__card" href="plasma-only.html">
          <span class="hero-index__card-label">Light</span>
          <span class="hero-index__card-title">Light Background</span>
          <span class="hero-index__card-desc">Warm grey background, split layout, stats row.</span>
        </a>

        <a class="hero-index__card" href="plasma-dark.html">
          <span class="hero-index__card-label">Dark</span>
          <span class="hero-index__card-title">Dark Background</span>
          <span class="hero-index__card-desc">Black background, centered copy, scroll button.</span>
        </a>
      </nav>
    </main>
  </body>
</html>
